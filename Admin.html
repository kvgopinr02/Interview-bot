<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Interview Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Cabinet+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#060608;--surface:#0e0e12;--card:#141418;--card2:#1c1c22;--border:#252530;--border2:#32323f;--accent:#e8ff47;--accent2:#ff6b35;--green:#3dffa0;--red:#ff4d6d;--blue:#4d9fff;--text:#f0f0f5;--muted:#64647a;--fh:'Clash Display',sans-serif;--fb:'Cabinet Grotesk',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ADMIN LOGIN */
    #adminLogin{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;animation:fadeUp .5s ease}
    .alogo{font-family:var(--fh);font-size:28px;font-weight:700;margin-bottom:6px;text-align:center}.alogo span{color:var(--accent)}
    .asub{font-size:13px;color:var(--muted);margin-bottom:32px;text-align:center}
    .acard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;width:100%;max-width:380px}
    .afield{margin-bottom:14px}
    .alabel{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:600;display:block}
    .ainput{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:12px 14px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s}
    .ainput:focus{border-color:var(--accent)}
    .abtn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#000;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .2s}
    .abtn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(232,255,71,.2)}
    .abtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .aerr{font-size:13px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}

    /* DASHBOARD */
    #dashboard{display:none;flex-direction:column;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(6,6,8,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
    .topbar-logo{font-family:var(--fh);font-size:18px;font-weight:700}.topbar-logo span{color:var(--accent)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .admin-badge{background:rgba(232,255,71,.1);border:1px solid rgba(232,255,71,.2);border-radius:100px;padding:4px 12px;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:1px}
    .tbtn2{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:7px 14px;color:var(--muted);font-family:var(--fb);font-size:12px;cursor:pointer;transition:all .2s}
    .tbtn2:hover{border-color:var(--red);color:var(--red)}

    .dash-body{padding:28px;max-width:1200px;margin:0 auto;width:100%;animation:fadeUp .5s ease}

    /* STATS GRID */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 20px}
    .stat-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:600}
    .stat-val{font-family:var(--fh);font-size:38px;font-weight:700;line-height:1}
    .stat-val.accent{color:var(--accent)}.stat-val.green{color:var(--green)}.stat-val.orange{color:var(--accent2)}.stat-val.blue{color:var(--blue)}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:6px}

    /* TABS */
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:12px;padding:4px;width:fit-content}
    .tab{padding:9px 20px;border-radius:9px;cursor:pointer;font-family:var(--fh);font-size:13px;font-weight:600;color:var(--muted);transition:all .2s}
    .tab.active{background:var(--card2);color:var(--text)}

    /* TABLE */
    .tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .tbl-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .tbl-title{font-family:var(--fh);font-size:15px;font-weight:600}
    .tbl-filter{display:flex;gap:8px}
    .fsel{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--text);font-family:var(--fb);font-size:12px;outline:none;cursor:pointer}
    table{width:100%;border-collapse:collapse}
    th{padding:12px 16px;text-align:left;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;background:var(--surface);border-bottom:1px solid var(--border)}
    td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-flex;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
    .badge.completed{background:rgba(61,255,160,.1);color:var(--green)}
    .badge.in_progress{background:rgba(255,192,61,.1);color:#ffc03d}
    .score-chip{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--accent)}
    .del-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
    .del-btn:hover{border-color:var(--red);color:var(--red)}
    .empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}

    /* USERS TABLE */
    .role-pill{display:inline-flex;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600}
    .role-pill.admin{background:rgba(232,255,71,.1);color:var(--accent)}
    .role-pill.candidate{background:rgba(77,159,255,.1);color:var(--blue)}
    .promo-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s}
    .promo-btn:hover{border-color:var(--accent);color:var(--accent)}

    .loading{text-align:center;padding:40px;color:var(--muted)}
    .spinner2{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}

    @media(max-width:700px){.dash-body{padding:16px}.stats-grid{grid-template-columns:1fr 1fr}th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4){display:none}}
  </style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div id="adminLogin">
  <div class="alogo">📊 Admin <span>Dashboard</span></div>
  <div class="asub">AI Interview Bot — Admin Panel</div>
  <div class="acard">
    <div class="afield"><label class="alabel">Admin Email</label><input class="ainput" id="aemail" type="email" placeholder="admin@example.com"/></div>
    <div class="afield"><label class="alabel">Password</label><input class="ainput" id="apass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()"/></div>
    <button class="abtn" id="albtn" onclick="adminLogin()">Access Dashboard →</button>
    <div class="aerr" id="aerr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">Interview<span>Bot</span> Admin</div>
    <div class="topbar-right">
      <div class="admin-badge">ADMIN</div>
      <span style="font-size:13px;color:var(--muted)" id="adminName"></span>
      <button class="tbtn2" onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <div class="dash-body">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Total Interviews</div><div class="stat-val accent" id="stTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val green" id="stCompleted">—</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-val orange" id="stInProgress">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-val blue" id="stUsers">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg Score</div><div class="stat-val accent" id="stAvg">—</div><div class="stat-sub">out of 10</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('interviews',this)">📋 Interviews</div>
      <div class="tab" onclick="switchTab('users',this)">👤 Users</div>
    </div>

    <!-- Interviews Table -->
    <div id="tabInterviews">
      <div class="tbl-wrap">
        <div class="tbl-head">
          <div class="tbl-title">All Interviews</div>
          <div class="tbl-filter">
            <select class="fsel" onchange="filterStatus(this.value)">
              <option value="">All Status</option>
              <option value="completed">Completed</option>
              <option value="in_progress">In Progress</option>
            </select>
          </div>
        </div>
        <div id="interviewsBody"><div class="loading"><div class="spinner2"></div>Loading...</div></div>
      </div>
    </div>

    <!-- Users Table -->
    <div id="tabUsers" style="display:none">
      <div class="tbl-wrap">
        <div class="tbl-head"><div class="tbl-title">All Users</div></div>
        <div id="usersBody"><div class="loading"><div class="spinner2"></div>Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE = 'https://bot-backend-wf3x.onrender.com';
let adminToken = localStorage.getItem('ib_admin_token') || '';
let adminUser  = JSON.parse(localStorage.getItem('ib_admin_user') || 'null');

window.onload = () => { if (adminToken && adminUser?.role === 'admin') showDashboard(); };

async function adminLogin() {
  const email=document.getElementById('aemail').value.trim(), password=document.getElementById('apass').value;
  const errEl=document.getElementById('aerr'), btn=document.getElementById('albtn');
  errEl.textContent=''; btn.disabled=true; btn.textContent='Logging in...';
  try {
    const res=await fetch(`${BASE}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json(); if(!res.ok) throw new Error(data.error);
    if(data.user.role!=='admin') throw new Error('You are not an admin. Ask the system admin to promote you.');
    adminToken=data.token; adminUser=data.user;
    localStorage.setItem('ib_admin_token',adminToken); localStorage.setItem('ib_admin_user',JSON.stringify(adminUser));
    showDashboard();
  } catch(err){ errEl.textContent='❌ '+err.message; }
  btn.disabled=false; btn.textContent='Access Dashboard →';
}

function adminLogout() { adminToken=''; adminUser=null; localStorage.removeItem('ib_admin_token'); localStorage.removeItem('ib_admin_user'); document.getElementById('adminLogin').style.display='flex'; document.getElementById('dashboard').style.display='none'; }

async function showDashboard() {
  document.getElementById('adminLogin').style.display='none'; document.getElementById('dashboard').style.display='flex';
  document.getElementById('adminName').textContent=adminUser.name;
  await loadAnalytics(); await loadInterviews(); loadUsers();
}

async function loadAnalytics() {
  try {
    const res=await fetch(`${BASE}/api/admin/analytics`,{headers:{'Authorization':'Bearer '+adminToken}});
    const d=await res.json();
    document.getElementById('stTotal').textContent=d.total||0;
    document.getElementById('stCompleted').textContent=d.completed||0;
    document.getElementById('stInProgress').textContent=d.inProgress||0;
    document.getElementById('stUsers').textContent=d.totalUsers||0;
    document.getElementById('stAvg').textContent=d.avgScore||'—';
  } catch{}
}

async function loadInterviews(status='') {
  const body=document.getElementById('interviewsBody');
  body.innerHTML='<div class="loading"><div class="spinner2"></div>Loading...</div>';
  try {
    const url=`${BASE}/api/admin/interviews${status?'?status='+status:''}`;
    const res=await fetch(url,{headers:{'Authorization':'Bearer '+adminToken}});
    const data=await res.json();
    if(!data.sessions?.length){body.innerHTML='<div class="empty">No interviews found.</div>';return;}
    body.innerHTML=`<table><thead><tr><th>Candidate</th><th>Role</th><th>Type</th><th>Date</th><th>Status</th><th>Score</th><th>Action</th></tr></thead><tbody>${
      data.sessions.map(s=>`<tr>
        <td><strong>${s.candidateName}</strong><br><span style="font-size:11px;color:var(--muted)">${s.userId?.email||''}</span></td>
        <td>${s.role}</td>
        <td>${s.interviewType}</td>
        <td>${new Date(s.createdAt).toLocaleDateString()}</td>
        <td><span class="badge ${s.status}">${s.status==='completed'?'✅ Completed':'🔄 In Progress'}</span></td>
        <td>${s.result?.score?`<span class="score-chip">${s.result.score}/10</span><br><span style="font-size:11px;color:var(--muted)">${s.result.verdict||''}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td><button class="del-btn" onclick="deleteInterview('${s._id}')">🗑 Delete</button></td>
      </tr>`).join('')
    }</tbody></table>`;
  } catch{ body.innerHTML='<div class="empty">Failed to load.</div>'; }
}

async function loadUsers() {
  const body=document.getElementById('usersBody');
  body.innerHTML='<div class="loading"><div class="spinner2"></div>Loading...</div>';
  try {
    const res=await fetch(`${BASE}/api/admin/users`,{headers:{'Authorization':'Bearer '+adminToken}});
    const users=await res.json();
    if(!users.length){body.innerHTML='<div class="empty">No users found.</div>';return;}
    body.innerHTML=`<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead><tbody>${
      users.map(u=>`<tr>
        <td><strong>${u.name}</strong></td>
        <td>${u.email}</td>
        <td><span class="role-pill ${u.role}">${u.role==='admin'?'👑 Admin':'👤 Candidate'}</span></td>
        <td>${new Date(u.createdAt).toLocaleDateString()}</td>
        <td>${u.role!=='admin'?`<button class="promo-btn" onclick="makeAdmin('${u._id}')">Make Admin</button>`:'<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      </tr>`).join('')
    }</tbody></table>`;
  } catch{ body.innerHTML='<div class="empty">Failed to load.</div>'; }
}

async function deleteInterview(id) {
  if(!confirm('Delete this interview?')) return;
  try {
    await fetch(`${BASE}/api/admin/interview/${id}`,{method:'DELETE',headers:{'Authorization':'Bearer '+adminToken}});
    loadInterviews(); loadAnalytics();
  } catch{ alert('Delete failed.'); }
}

async function makeAdmin(id) {
  if(!confirm('Promote this user to admin?')) return;
  try {
    await fetch(`${BASE}/api/admin/user/${id}/make-admin`,{method:'PATCH',headers:{'Authorization':'Bearer '+adminToken}});
    loadUsers();
  } catch{ alert('Failed.'); }
}

function filterStatus(val) { loadInterviews(val); }

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.getElementById('tabInterviews').style.display = tab==='interviews'?'block':'none';
  document.getElementById('tabUsers').style.display      = tab==='users'?'block':'none';
  if(tab==='users') loadUsers();
}
</script>
</body>

</html>
